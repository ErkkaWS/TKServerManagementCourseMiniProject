<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: #0a0a0a;
    font-family: 'Inter', sans-serif;
    color: #fff;
  }

  .stage {
    position: relative;
    width: 100vw;
    height: 100vh;
    display: flex;
  }

  /* Each half holds a full-bleed portrait */
  .half {
    position: relative;
    flex: 1;
    height: 100%;
    overflow: hidden;
    text-decoration: none;
    color: #fff;
    cursor: pointer;
  }

  .half img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 30%;
    filter: grayscale(1) contrast(1.05);
    transition: transform 1.2s cubic-bezier(.2,.7,.2,1), filter .8s ease;
  }

  /* Erkan tinttauskuvassa pää on ylempänä, säädetään erikseen */
  .right img { object-position: center 38%; }
  /* Vilin kuvassa kasvot ylhäällä (koko vartalo näkyvissä) */
  .left img  { object-position: center 20%; }

  /* Vignette — dark fade around edges, lighter in the middle of each portrait */
  .half::after {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    background:
      radial-gradient(ellipse at center, transparent 35%, rgba(0,0,0,0.55) 80%, rgba(0,0,0,0.95) 100%),
      linear-gradient(to bottom, rgba(0,0,0,0.15) 0%, transparent 25%, transparent 60%, rgba(0,0,0,0.85) 100%);
    transition: opacity .6s ease;
  }

  .half:hover img {
    transform: scale(1.04);
  }

  /* Center divider */
  .divider {
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 1px;
    height: 100%;
    background: linear-gradient(
      to bottom,
      transparent 0%,
      rgba(255,255,255,0.15) 8%,
      rgba(255,255,255,0.4) 50%,
      rgba(255,255,255,0.15) 92%,
      transparent 100%
    );
    z-index: 5;
    pointer-events: none;
  }

  /* WELCOME header — bold modern sans, wide tracking */
  .welcome {
    position: absolute;
    top: 6vh;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    font-family: 'Archivo Black', sans-serif;
    font-size: clamp(2.4rem, 6.5vw, 6rem);
    letter-spacing: 0.35em;
    text-indent: 0.35em; /* compensates trailing spacing for visual centering */
    color: #fff;
    text-transform: uppercase;
    line-height: 1;
    pointer-events: none;
    text-shadow: 0 2px 30px rgba(0,0,0,0.7);
    animation: fadeDown 1.4s cubic-bezier(.2,.7,.2,1) both;
  }

  /* Small accent line under WELCOME */
  .welcome::after {
    content: "";
    display: block;
    width: 80px;
    height: 1px;
    background: rgba(255,255,255,0.5);
    margin: 1.2rem auto 0;
    text-indent: 0;
  }

  /* Name labels */
  .name-label {
    position: absolute;
    bottom: 8vh;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    font-size: clamp(1.6rem, 3vw, 2.8rem);
    color: #fff;
    letter-spacing: 0.5em;
    text-indent: 0.5em;
    text-transform: uppercase;
    text-decoration: none;
    padding: 0.6rem 1.4rem;
    text-shadow: 0 2px 20px rgba(0,0,0,0.8);
    transition: letter-spacing .5s ease, color .3s ease;
    pointer-events: none; /* clicks go to the half itself */
  }

  .name-label::before {
    content: "";
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 1px;
    background: #fff;
    transition: width .5s cubic-bezier(.2,.7,.2,1);
  }

  .half:hover .name-label::before {
    width: 70%;
  }

  .half:hover .name-label {
    letter-spacing: 0.6em;
    text-indent: 0.6em;
  }

  /* Stagger the entry */
  .left  { animation: slideInL 1.2s cubic-bezier(.2,.7,.2,1) both; }
  .right { animation: slideInR 1.2s cubic-bezier(.2,.7,.2,1) both; }
  .left .name-label,
  .right .name-label { animation: fadeUp 1.4s .6s cubic-bezier(.2,.7,.2,1) both; }

  @keyframes slideInL {
    from { opacity: 0; transform: translateX(-30px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  @keyframes slideInR {
    from { opacity: 0; transform: translateX(30px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  @keyframes fadeDown {
    from { opacity: 0; transform: translate(-50%, -20px); }
    to   { opacity: 1; transform: translate(-50%, 0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translate(-50%, 20px); }
    to   { opacity: 1; transform: translate(-50%, 0); }
  }

  /* Mobile: stack vertically */
  @media (max-width: 700px) {
    .stage { flex-direction: column; }
    .divider {
      top: 50%; left: 0;
      width: 100%; height: 1px;
      transform: translateY(-50%);
      background: linear-gradient(
        to right,
        transparent 0%,
        rgba(255,255,255,0.4) 50%,
        transparent 100%
      );
    }
    .welcome { top: 3vh; font-size: clamp(1.8rem, 9vw, 3rem); }
    .name-label { bottom: 4vh; font-size: 1.2rem; }
  }
</style>
</head>
<body>
  <main class="stage">
    <a href="vili.html" class="half left" aria-label="Vili">
      <img src="vili.png" alt="Vili">
      <span class="name-label">Vili</span>
    </a>

    <a href="erkka.html" class="half right" aria-label="Erkka">
      <img src="erkka.jpg" alt="Erkka">
      <span class="name-label">Erkka</span>
    </a>

    <div class="divider"></div>
    <h1 class="welcome">Welcome</h1>
  </main>
</body>
</html>
