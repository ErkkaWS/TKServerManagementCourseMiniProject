server {
    listen 80;
    server_name _;

    root /var/www/html;
    index index.html;

    location / {
    	try_files $uri $uri/ =404;
    }
	
	location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
    }

	location /erkka/ {
    	alias /var/www/html/erkka/;
		index index.html;
    }

	location /vili/ {
    	alias /var/www/html/vili/;
		index index.html;
    }

	error_page 404 /404/404.html;
	location = /404/404.html {
    internal;
	}
}
