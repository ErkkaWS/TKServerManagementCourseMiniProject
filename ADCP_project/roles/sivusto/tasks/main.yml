- name: Luo web root -hakemisto
  file:
    path: /var/www/etusivu
    state: directory
    owner: www-data
    group: www-data
    mode: '0755'

- name: Kopioi etusivun index.html
  copy:
    src: etusivu/index.html
    dest: /var/www/html/index.html
    owner: www-data
    group: www-data
    mode: '0644'
