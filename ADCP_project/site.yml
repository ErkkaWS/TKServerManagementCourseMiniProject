- hosts: all
  become: true
  vars_files:
    - vars/main.yml
  roles:
    -webserver
    -nginx_conf
    -palomuuri
    -sivusto
    -php

- name: nginx
  apt:
    name: nginx
    state: present

- copy:
    dest: "/etc/nginx/sites-available/uncleco.com.conf"
    src: "uncleco.com.conf"
    owner: "root"
    group: "root"
    mode: "0644"
  notify: restart nginx

- file:
    src: /etc/nginx/sites-available/uncleco.com.conf
    dest: /etc/nginx/sites-enabled/uncleco.com.conf
    owner: root
    group: root
    state: link
  notify: restart nginx 
 
